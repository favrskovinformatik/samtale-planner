<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Samtale Fordeler v21 - Brute Force & 30m Loft</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f4f8; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1000px; margin: auto; }
        textarea { width: 100%; border: 1px solid #b2bec3; border-radius: 6px; padding: 10px; font-family: monospace; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 15px 0; }
        button { background: #c0392b; color: white; padding: 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; }
        .log { background: #2d3436; color: #00ff00; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 11px; height: 180px; overflow-y: auto; margin-top: 15px; }
        .progress-bar { background: #eee; height: 15px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: #c0392b; height: 100%; width: 0%; transition: width 0.1s; }
        .stat-box { display: flex; gap: 20px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>🗓️ Samtale Fordeler v21</h1>
    <div class="stat-box">
        <div id="stat-unplaced" style="color: #c0392b;">Afviste: -</div>
        <div id="stat-student">Elev-gap: -</div>
        <div id="stat-efficiency">Lærer-effekt: -</div>
    </div>

    <label>1. Input: Elevdata</label>
    <textarea id="rawInput" style="height: 100px;"></textarea>

    <div class="grid">
        <div class="input-group">
            <label>Standard Tider</label><br>
            Start: <input type="time" id="startTime" value="17:00"> 
            Slut: <input type="time" id="endTime" value="21:00"><br><br>
            Varighed: <input type="number" id="duration" value="10" style="width: 50px;"> min.
        </div>
        <div class="input-group">
            <label>Individuel starttid (ID, Tid)</label>
            <textarea id="locks" style="height: 65px;" placeholder="JS, 15:30"></textarea>
        </div>
    </div>

    <button id="runBtn" onclick="runOptimized()">KØR BRUTE FORCE (20.000 SIMULERINGER)</button>
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    <div class="log" id="status">Klar...</div>
</div>

<script>
function parseTime(s) { const [h, m] = s.split(':').map(Number); return h * 60 + m; }
function formatTime(m) { return `${Math.floor(m/60)}:${(m%60).toString().padStart(2, '0')}`; }
function getTeacherInitials(str) { return str.trim().split(' ')[0].toUpperCase(); }

function runOptimized() {
    const btn = document.getElementById('runBtn');
    const log = document.getElementById('status');
    const prog = document.getElementById('progress');
    const input = document.getElementById('rawInput').value.trim();
    const locksRaw = document.getElementById('locks').value.trim();
    if(!input) return alert("Indsæt data");

    btn.disabled = true;
    let bestFinalResult = null;
    let bestScore = Infinity;
    const iterations = 20000;
    const batchSize = 250; 
    let i = 0;

    log.innerHTML = "Starter Brute Force (20.000)...<br>";

    function doBatch() {
        for (let b = 0; b < batchSize && i < iterations; b++) {
            const result = runSingleSimulation(input, locksRaw, i !== 0);
            if (result.score < bestScore) {
                bestScore = result.score;
                bestFinalResult = result;
                updateStats(result);
                log.innerHTML += `[${i}] Ny bedste plan fundet. Afviste: ${result.unplacedCount}<br>`;
                log.scrollTop = log.scrollHeight;
            }
            i++;
        }
        prog.style.width = (i / iterations * 100) + "%";
        if (i < iterations) {
            setTimeout(doBatch, 0);
        } else {
            log.innerHTML += "<strong>Optimering færdig!</strong>";
            btn.disabled = false;
            generateExcel(bestFinalResult);
        }
    }
    doBatch();
}

function updateStats(res) {
    document.getElementById('stat-unplaced').innerText = "Afviste: " + res.unplacedCount;
    document.getElementById('stat-student').innerText = "Elev-gap: " + res.studentGap + "m";
    document.getElementById('stat-efficiency').innerText = "Lærer-effekt: " + Math.round(res.teacherEfficiency);
}

function runSingleSimulation(input, locksRaw, shuffle) {
    const duration = parseInt(document.getElementById('duration').value);
    const globalStartM = parseTime(document.getElementById('startTime').value);
    const endM = parseTime(document.getElementById('endTime').value);
    const roomList = ["101", "409", "308", "309", "310", "312", "313", "315", "317", "508", "509", "510", "511", "513", "320", "321", "322", "323", "324", "210", "211", "213", "215", "216", "217", "218", "219", "220"];
    
    const startConstraints = {};
    let minS = globalStartM;
    if(locksRaw) {
        locksRaw.split('\n').forEach(line => {
            const p = line.split(',');
            if(p.length === 2) {
                const t = parseTime(p[1].trim());
                startConstraints[p[0].trim().toUpperCase()] = t;
                if(t < minS) minS = t;
            }
        });
    }

    const slots = [];
    for(let t = minS; t < endM; t += duration) slots.push(t);

    let students = input.split('\n').map(line => {
        const parts = line.split('\t');
        return { name: parts[0], id: parts[1], class: parts[1].substring(0,2), wishes: parts[2].split(',').map(w => ({ fullText: w.trim(), initials: getTeacherInitials(w), done: false, reason: "" })), schedule: {} };
    });

    if(shuffle) students.sort(() => Math.random() - 0.5);

    const teacherIds = [...new Set(students.flatMap(s => s.wishes.map(w => w.initials)))];
    const teachers = {};
    teacherIds.forEach((init, idx) => {
        teachers[init] = { id: init, room: roomList[idx % roomList.length], plan: {}, firstStart: startConstraints[init] || globalStartM };
    });

    const roomOccupancy = {};

    function canBook(teacher, slot, room) {
        if (slot < teacher.firstStart || teacher.plan[slot] || (roomOccupancy[slot] && roomOccupancy[slot][room])) return false;
        
        // Max 30 min hul tjek
        const ts = Object.keys(teacher.plan).map(Number).sort((a,b) => a-b);
        if(ts.length > 0) {
            let gapToStart = slot - teacher.firstStart;
            let gapToPrev = 0;
            let gapToNext = 0;
            
            // Find nærmeste eksisterende samtaler
            let prev = ts.filter(t => t < slot).pop();
            let next = ts.filter(t => t > slot).shift();

            if(prev) gapToPrev = slot - prev - duration;
            else gapToPrev = slot - teacher.firstStart; // Hul fra deres ønskede starttid

            if(gapToPrev > 30) return "GAP"; // Fejlkode for stort hul
        }

        // 7-reglen
        let count = 1, tL = slot - duration, tR = slot + duration;
        while(teacher.plan[tL]) { count++; tL -= duration; }
        while(teacher.plan[tR]) { count++; tR += duration; }
        if(count > 7) return false;

        return true;
    }

    for (let target = 3; target >= 1; target--) {
        students.forEach(s => {
            let active = s.wishes.filter(w => !w.done);
            if (active.length < target) return;

            let bestWin = null;
            let lowestScore = Infinity;

            for (let i = 0; i < slots.length; i++) {
                let curSched = {}, curT = slots[i], placed = 0, penalty = 0;
                let lastT = -1;

                for (let wish of active) {
                    if (placed >= target) break;
                    let found = false;
                    for (let gap = 0; gap <= 20; gap += duration) {
                        let t = curT + gap;
                        if (t >= endM) break;
                        const tea = teachers[wish.initials];
                        const res = canBook(tea, t, tea.room);
                        if (res === true) {
                            curSched[t] = wish;
                            if (lastT !== -1) penalty += (t - lastT - duration) * 5; 
                            lastT = t; curT = t + duration; placed++; found = true;
                            break;
                        } else if (res === "GAP") {
                            wish.reason = "Ville skabe >30 min hul hos " + wish.initials;
                        }
                    }
                    if(!found) break;
                }
                if (placed === target && penalty < lowestScore) { lowestScore = penalty; bestWin = curSched; }
            }

            if (bestWin) {
                Object.keys(bestWin).forEach(t => {
                    const time = parseInt(t); const wish = bestWin[t]; const tea = teachers[wish.initials];
                    tea.plan[time] = { studentId: s.id, studentName: s.name, subject: wish.fullText };
                    if(!roomOccupancy[time]) roomOccupancy[time] = {};
                    roomOccupancy[time][tea.room] = tea.id;
                    s.schedule[time] = wish.fullText;
                    wish.done = true;
                });
            }
        });
    }

    let unplaced = 0, sGap = 0, effPen = 0;
    students.forEach(s => {
        unplaced += s.wishes.filter(w => !w.done).length;
        const ts = Object.keys(s.schedule).map(Number).sort((a,b) => a-b);
        for(let j=1; j<ts.length; j++) sGap += (ts[j] - ts[j-1] - duration);
    });
    Object.values(teachers).forEach(tea => {
        const ts = Object.keys(tea.plan).map(Number).sort((a,b) => a-b);
        if(ts.length > 0) {
            const gap = (ts[ts.length-1]-ts[0]+duration) - (ts.length*duration);
            effPen += (gap * gap) / ts.length;
        }
    });

    const score = (unplaced * 100000) + (sGap * 10) + effPen;
    return { score, students, teachers, slots, unplacedCount: unplaced, studentGap: sGap, teacherEfficiency: effPen };
}

function generateExcel(res) {
    const wb = XLSX.utils.book_new();
    const sortedT = Object.keys(res.teachers).sort();
    const matrix = [["Lokale", ...sortedT.map(id => res.teachers[id].room)], ["Tid", ...sortedT]];
    res.slots.forEach(t => {
        const row = [formatTime(t)];
        sortedT.forEach(id => row.push(res.teachers[id].plan[t] ? res.teachers[id].plan[t].studentId : ""));
        matrix.push(row);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(matrix), "Lærer_Matrix");
    
    // Klasse-ark
    const classIds = [...new Set(res.students.map(s => s.class))].sort();
    classIds.forEach(c => {
        const cStus = res.students.filter(s => s.class === c);
        const cWishes = [...new Set(cStus.flatMap(s => s.wishes.map(w => w.fullText)))].sort();
        const rows = [["Navn", "ElevID", ...cWishes]];
        cStus.forEach(s => {
            const row = [s.name, s.id];
            cWishes.forEach(wT => {
                const time = Object.keys(s.schedule).find(k => s.schedule[k] === wT);
                row.push(time ? formatTime(parseInt(time)) : "");
            });
            rows.push(row);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Klasse_" + c);
    });

    // IKKE PLACERET med forklaring
    const unp = [["ID", "Navn", "Lærer/Fag", "Årsag"]];
    res.students.forEach(s => {
        s.wishes.filter(w => !w.done).forEach(w => {
            unp.push([s.id, s.name, w.fullText, w.reason || "Ingen ledig tid fundet indenfor elevens 20-min ramme"]);
        });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(unp), "IKKE_PLACERET");

    sortedT.forEach(id => {
        const rows = [["Tid", "Navn", "ID", "Fag"]];
        res.slots.forEach(t => {
            const p = res.teachers[id].plan[t];
            rows.push([formatTime(t), p ? p.studentName : "", p ? p.studentId : "", p ? p.subject : ""]);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Lærer_" + id);
    });
    XLSX.writeFile(wb, "Samtaleplan_v21_BruteForce.xlsx");
}
</script>
</body>
</html>
